<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Soporte - GIKO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A1F44">
    <style>
        :root {
            --navy: #0A1F44;
            --navy-deep: #061530;
            --navy-mid: #0F2A56;
            --accent: #3B82F6;
            --accent-soft: #EAF1FF;
            --ink: #0B1220;
            --muted: #7C8598;
            --hairline: #E7E9F0;
            --bg: #F4F6FB;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            margin: 0;
            padding: 0;
            font-family: -apple-system, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
            min-height: 100vh;
            color: var(--ink);
        }

        .bank-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            position: relative;
        }

        /* ---- Header estilo "Large Title" iOS ---- */
        .bank-header {
            background: linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
            color: white;
            padding: calc(env(safe-area-inset-top, 0px) + 18px) 20px 28px;
            position: relative;
            border-bottom-left-radius: 34px;
            border-bottom-right-radius: 34px;
            box-shadow: 0 12px 30px rgba(6, 21, 48, 0.35);
        }

        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }

        .back-arrow {
            color: white;
            font-size: 17px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.12);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.2px;
            opacity: 0.85;
        }

        .nav-spacer { width: 34px; }

        .bank-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.8px;
        }

        .header-subtitle {
            font-size: 15px;
            opacity: 0.72;
            font-weight: 400;
            margin-top: 2px;
        }

        /* ---- Contenido ---- */
        .support-section {
            padding: 24px 18px 40px;
        }

        .section-eyebrow {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin: 4px 6px 10px;
        }

        .bank-cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        /* ---- Card estilo lista nativa iOS ---- */
        .bank-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 1px 2px rgba(10, 31, 68, 0.04), 0 8px 24px rgba(10, 31, 68, 0.06);
            border: 1px solid var(--hairline);
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            color: white;
            flex-shrink: 0;
        }

        .icon-support {
            background: linear-gradient(135deg, #34C759 0%, #1FA24B 100%);
        }

        .icon-dev {
            background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy) 100%);
        }

        .card-title-area { flex: 1; min-width: 0; }

        .card-title {
            font-size: 16.5px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 2px;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }

        .card-number {
            background: var(--accent-soft);
            border: 1px solid #DCE8FF;
            border-radius: 13px;
            padding: 12px 14px;
            font-size: 15.5px;
            font-weight: 600;
            color: var(--navy);
            text-align: center;
            margin: 14px 0 16px;
            letter-spacing: 0.3px;
            font-variant-numeric: tabular-nums;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
        }

        .bank-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        .btn-call {
            background: var(--navy);
            color: white;
        }

        .bank-btn:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn-icon { font-size: 17px; }

        .security-note {
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            color: var(--muted);
            font-size: 12.5px;
            font-weight: 500;
            margin-top: 26px;
        }

        .security-note i { color: var(--navy); }
    </style>
</head>
<body>
    <div class="bank-container">
        <!-- Header -->
        <div class="bank-header">
            <div class="nav-row">
                <a href="dashboard.html" class="back-arrow">
                    <i class="fas fa-chevron-left"></i>
                </a>
                <div class="nav-title">GIKO</div>
                <div class="nav-spacer"></div>
            </div>

            <div class="bank-logo">
                <div class="logo-icon">GK</div>
                <div class="logo-text">GIKO</div>
            </div>

            <div class="header-subtitle">Soporte 24/7</div>
        </div>

        <!-- Contenido Principal -->
        <div class="support-section">
            <div class="section-eyebrow">Contactar soporte</div>

            <div class="bank-cards">
                <!-- Tarjeta Atención al Cliente -->
                <div class="bank-card">
                    <div class="card-header">
                        <div class="card-icon icon-support">
                            <i class="fas fa-headset"></i>
                        </div>
                        <div class="card-title-area">
                            <div class="card-title">Atención al Cliente</div>
                            <div class="card-subtitle">Soporte general y operaciones</div>
                        </div>
                    </div>

                    <div class="card-number">+591 62315600</div>

                    <div class="card-buttons">
                        <button class="bank-btn btn-whatsapp" onclick="whatsappAtencion()">
                            <i class="fab fa-whatsapp btn-icon"></i>
                            WhatsApp
                        </button>

                        <button class="bank-btn btn-call" onclick="llamarAtencion()">
                            <i class="fas fa-phone btn-icon"></i>
                            Llamar
                        </button>
                    </div>
                </div>

                <!-- Tarjeta Hazte Socio -->
                <div class="bank-card">
                    <div class="card-header">
                        <div class="card-icon icon-dev">
                            <i class="fas fa-handshake"></i>
                        </div>
                        <div class="card-title-area">
                            <div class="card-title">Hazte Socio de GIKO</div>
                            <div class="card-subtitle">Únete y genera ingresos con nosotros</div>
                        </div>
                    </div>

                    <div class="card-number">+591 62315600</div>

                    <div class="card-buttons">
                        <button class="bank-btn btn-whatsapp" onclick="whatsappSocios()">
                            <i class="fab fa-whatsapp btn-icon"></i>
                            WhatsApp
                        </button>

                        <button class="bank-btn btn-call" onclick="llamarSocios()">
                            <i class="fas fa-phone btn-icon"></i>
                            Llamar
                        </button>
                    </div>
                </div>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-halved"></i>
                Comunicación segura y verificada
            </div>
        </div>
    </div>

    <script>
        // Atención al Cliente
        function llamarAtencion() {
            window.location.href = "tel:+59162315600";
        }

        function whatsappAtencion() {
            const numero = "59162315600";
            const mensaje = "Hola, necesito ayuda con GIKO - Atención al Cliente";
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // Hazte Socio
        function llamarSocios() {
            window.location.href = "tel:+59162315600";
        }

        function whatsappSocios() {
            const numero = "59162315600";
            const mensaje = "Hola, quiero información para hacerme Socio de GIKO";
            window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`, '_blank');
        }

        // Efectos interactivos
        document.querySelectorAll('.bank-btn').forEach(btn => {
            btn.addEventListener('touchstart', function() {
                this.style.opacity = '0.9';
                this.style.transform = 'scale(0.96)';
            });

            btn.addEventListener('touchend', function() {
                this.style.opacity = '1';
                this.style.transform = 'scale(1)';
            });
        });

        // Efecto de carga
        document.addEventListener('DOMContentLoaded', function() {
            const cards = document.querySelectorAll('.bank-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(16px)';

                setTimeout(() => {
                    card.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 150);
            });
        });
    </script>
</body>
</html>
